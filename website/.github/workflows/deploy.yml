name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: |
          cd website
          npm ci

      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: website/node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('website/src/**/*.astro', 'website/src/**/*.ts', 'website/astro.config.mjs', 'website/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Build Astro
        run: |
          cd website
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
