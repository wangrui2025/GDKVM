name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: website

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

      - name: Verify hreflang base dedupe (§2.7)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const BASE = 'GDKVM';
          function walk(dir) {
            const out = [];
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...walk(p));
              else if (e.isFile() && e.name.endsWith('.html')) out.push(p);
            }
            return out;
          }
          const files = walk('website/dist');
          const broken = [];
          files.forEach(f => {
            const c = fs.readFileSync(f, 'utf-8');
            const re = /<link rel=\"alternate\" hreflang=\"[^\"]*\" href=\"([^\"]+)\"/g;
            let m;
            while ((m = re.exec(c)) !== null) {
              const url = m[1];
              const hits = (url.match(new RegExp(BASE, 'g')) || []).length;
              if (hits > 1) broken.push(\`\${f}: \${url} has \${BASE} \${hits} times\`);
            }
          });
          if (broken.length) { console.log(broken.join('\n')); process.exit(1); }
          console.log('OK: no hreflang base duplication');
          "

      - name: Run E2E tests
        run: npx playwright test
        working-directory: website

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7

  build-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

      - name: Verify hreflang base dedupe (§2.7)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const BASE = 'GDKVM';
          function walk(dir) {
            const out = [];
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) out.push(...walk(p));
              else if (e.isFile() && e.name.endsWith('.html')) out.push(p);
            }
            return out;
          }
          const files = walk('website/dist');
          const broken = [];
          files.forEach(f => {
            const c = fs.readFileSync(f, 'utf-8');
            const re = /<link rel=\"alternate\" hreflang=\"[^\"]*\" href=\"([^\"]+)\"/g;
            let m;
            while ((m = re.exec(c)) !== null) {
              const url = m[1];
              const hits = (url.match(new RegExp(BASE, 'g')) || []).length;
              if (hits > 1) broken.push(\`\${f}: \${url} has \${BASE} \${hits} times\`);
            }
          });
          if (broken.length) { console.log(broken.join('\n')); process.exit(1); }
          console.log('OK: no hreflang base duplication');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
